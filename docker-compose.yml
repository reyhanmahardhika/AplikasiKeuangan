services:
  postgres:
    image: postgres:16-alpine
    container_name: finance_ai_postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: finance
      POSTGRES_PASSWORD: finance
      POSTGRES_DB: finance_ai
    ports:
      - "5432:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U finance -d finance_ai"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  postgres-data:
